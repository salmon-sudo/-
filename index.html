<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sвязь-Телеком: AI Support Pro</title>
    <style>
        /* [ВЕСЬ ВАШ ДИЗАЙН СОХРАНЕН] */
        :root {
            --bg-dark: #0a0e17;
            --bg-panel: #111827;
            --primary: #10b981;
            --accent: #22d3ee;
            --text-main: #f3f4f6;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0f172a;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        .bg-dots {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.5;
            z-index: 1;
        }

        .support-container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
            z-index: 10;
            position: relative;
        }

        .chat-window {
            background: var(--bg-panel);
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 750px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .chat-header {
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-box {
            width: 18px;
            height: 18px;
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--primary);
        }

        #chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 14px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
        }

        .user-msg {
            background: #1e293b;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-msg {
            background: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        button {
            padding: 12px 20px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #064e3b;
        }

        .analytics-panel {
            background: #0d1117;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 13px;
        }

        .ticket-card {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent);
            font-size: 11px;
            margin-left: auto;
        }

        .option-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            margin: 5px 5px 0 0;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="bg-dots"></div>

    <div class="support-container">
        <div class="chat-window">
            <div class="chat-header">
                <div class="logo-box"></div>
                <strong>Связь-Телеком: AI</strong>
                <span id="model-status" class="status-pill">Загрузка...</span>
            </div>
            <div id="chat-messages">
                <div class="message bot-msg">Здравствуйте! Опишите вашу проблему, я постараюсь помочь.</div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ваш вопрос..." autocomplete="off">
                <button onclick="handleSend()">Отправить</button>
            </div>
        </div>

        <div class="analytics-panel">
            <h4 style="color: var(--accent); margin-bottom: 15px;">📊 Мониторинг системы</h4>
            <div id="logs" style="color: #94a3b8">> Ожидание инициализации...</div>
            <div id="ticket-area" style="display: none;">
                <div class="ticket-card">
                    <b style="color: var(--primary)">[✓] ТИКЕТ СОЗДАН</b>
                    <div id="ticket-data" style="margin-top: 10px; line-height: 1.6;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline } from 'https://esm.sh/@huggingface/transformers@3.8.1';

        const MODEL_ID = 'onnx-community/Qwen2.5-1.5B-Instruct';
        let generator = null;
        let ticket = { id: null, active: false, details: [] };

        const knowledgeBase = [
            { keywords: ['интернет', 'не работает', 'связь'], solution: "Рекомендуем перезагрузить роутер и проверить кабель WAN.", category: "Техподдержка" },
            { keywords: ['оплата', 'деньги', 'баланс'], solution: "Проверить баланс можно в ЛК. Мы поддерживаем оплату картами СБП.", category: "Финансовый отдел" }
        ];

        async function initModel() {
            const status = document.getElementById('model-status');
            try {
                // Попытка WebGPU
                generator = await pipeline('text-generation', MODEL_ID, {
                    device: 'webgpu',
                    dtype: 'q4'
                });
                status.textContent = "AI Ready (GPU)";
            } catch (e) {
                console.error("WebGPU failed, falling back to CPU", e);
                // Попытка CPU (медленнее, но надежнее для AMD ноутбуков)
                generator = await pipeline('text-generation', MODEL_ID, {
                    device: 'cpu',
                    dtype: 'q4'
                });
                status.textContent = "AI Ready (CPU)";
            }
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || ticket.active) return;

            addMsg(text, 'user-msg');
            input.value = '';
            document.getElementById('logs').innerHTML = `> Анализ: ${text.slice(0, 20)}...<br>> Поиск решения...`;

            // 1. Проверка базы знаний
            const kbMatch = knowledgeBase.find(k => k.keywords.some(w => text.toLowerCase().includes(w)));
            let response = "";

            if (kbMatch) {
                response = kbMatch.solution;
                document.getElementById('logs').innerHTML += `<br>> Найдено в базе знаний`;
            } else {
                // 2. Использование AI с защитой от иероглифов
                const prompt = `<|im_start|>system\nТы — поддержка "Связь-Телеком". Ответь кратко на русском (1 фраза).<|im_end|>\n<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;

                try {
                    const out = await generator(prompt, {
                        max_new_tokens: 45,
                        temperature: 0.1, // Минимальная случайность для стабильности
                        stop_sequences: ['<|im_end|>', 'User:', '\n'], // Остановка на тех. тегах
                        return_full_text: false
                    });

                    response = out[0].generated_text.trim();
                    // Очистка от остаточного мусора (включая китайские символы)
                    response = response.split('<|im_end|>')[0].replace(/[^а-яА-ЯёЁa-zA-Z0-9\s.,!?\-]/g, '');
                } catch (err) {
                    response = "Извините, сейчас я не могу обработать запрос. Перевожу на оператора.";
                }
            }

            addMsg(response, 'bot-msg');
            createOptions(['Создать заявку', 'Спасибо, не надо']);
        }

        function createOptions(opts) {
            const div = document.createElement('div');
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = o;
                b.onclick = () => {
                    addMsg(o, 'user-msg');
                    if (o === 'Создать заявку') makeTicket();
                    else addMsg("Всегда на связи!", 'bot-msg');
                };
                div.appendChild(b);
            });
            document.getElementById('chat-messages').appendChild(div);
        }

        function makeTicket() {
            ticket.id = Math.floor(Math.random() * 8999) + 1000;
            ticket.active = true;
            document.getElementById('ticket-area').style.display = 'block';
            document.getElementById('ticket-data').innerHTML = `ID: #${ticket.id}<br>Статус: В работе<br>Приоритет: Средний`;
            addMsg(`Заявка #${ticket.id} создана. Специалист свяжется с вами.`, 'bot-msg');
        }

        function addMsg(t, c) {
            const m = document.createElement('div');
            m.className = `message ${c}`;
            m.innerHTML = t;
            const container = document.getElementById('chat-messages');
            container.appendChild(m);
            container.scrollTop = container.scrollHeight;
        }

        initModel();
        window.handleSend = handleSend;
    </script>
</body>
</html>
